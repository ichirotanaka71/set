<style>
/* アニメーションとスタイルをここに統合 */
:root { --washi: #f2ede4; --sumi: #1a1510; --kin: #c49a3c; --aka: #b5321e; --seiji: #3d6e63; }
body { background: var(--washi); color: var(--sumi); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin:0; }

/* 霊のアニメーション */
@keyframes spirit-alive {
  0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
  33% { transform: translateY(-8px) rotate(2deg) scale(1.03); }
  66% { transform: translateY(-4px) rotate(-2deg) scale(0.97); }
}

/* 12枚対応のグリッド */
#board { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 6px; flex: 1; padding: 10px; }
.card { background: white; border: 1px solid #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .1s; }
.card.selected { border: 2px solid var(--kin); background: #fffbf0; }
.card.correct { border: 2px solid var(--seiji); }
.card.wrong { border: 2px solid var(--aka); }

/* SVGアイコンをふわふわさせる */
.card svg { 
  width: 80%; height: 80%; display: block;
  animation: spirit-alive 4s ease-in-out infinite;
  animation-delay: var(--float-delay, 0s);
  transform-origin: center;
}
#ui { padding: 10px; text-align: center; font-weight: bold; }
</style>

<div id="ui">組 -KUMI- <span id="score">0</span></div>
<div id="board"></div>

<script>
// --- ロジック部分 ---
const COLORS=['aka','seiji','yamabuki'], SHAPES=['ougi','torii','ume'], COUNTS=[1,2,3], CM={aka:'#b5321e',seiji:'#3d6e63',yamabuki:'#c49a3c'};
let deck=[],board=[],sel=[],score=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function makeDeck(){const d=[];for(const c of COLORS)for(const s of SHAPES)for(const n of COUNTS)d.push({color:c,shape:s,count:n});return shuffle(d);}
function isSet(a,b,c){for(const k of['color','shape','count']){if(new Set([a[k],b[k],c[k]]).size===2)return false;}return true;}

// --- 図形描画ロジック（ここが抜けていました！） ---
function drawOugi(col,cy){const g=document.createElementNS('http://www.w3.org/2000/svg','g');const cx=40,base=cy+10;const fanPath=document.createElementNS('http://www.w3.org/2000/svg','path');let d=`M ${cx} ${base} `;for(let a=-70;a<=70;a+=10){const rad=(a-90)*Math.PI/180;d+=`L ${cx+Math.cos(rad)*18} ${base+Math.sin(rad)*18} `;}d+=`Z`;fanPath.setAttribute('d',d);fanPath.setAttribute('fill',col);g.appendChild(fanPath);return g;}
function drawTorii(col,cy){const g=document.createElementNS('http://www.w3.org/2000/svg','g');const cx=40;const kasagi=document.createElementNS('http://www.w3.org/2000/svg','path');kasagi.setAttribute('d',`M ${cx-16} ${cy-8} Q ${cx} ${cy-14} ${cx+16} ${cy-8} L ${cx+16} ${cy-4} Q ${cx} ${cy-10} ${cx-16} ${cy-4} Z`);kasagi.setAttribute('fill',col);g.appendChild(kasagi);const l=document.createElementNS('http://www.w3.org/2000/svg','rect');l.setAttribute('x',cx-13);l.setAttribute('y',cy-10);l.setAttribute('width','5');l.setAttribute('height','24');l.setAttribute('fill',col);g.appendChild(l);const r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x',cx+8);r.setAttribute('y',cy-10);r.setAttribute('width','5');r.setAttribute('height','24');r.setAttribute('fill',col);g.appendChild(r);return g;}
function drawUme(col,cy){const g=document.createElementNS('http://www.w3.org/2000/svg','g');const cx=40;for(let i=0;i<5;i++){const a=(i*72-90)*Math.PI/180;const p=document.createElementNS('http://www.w3.org/2000/svg','ellipse');p.setAttribute('cx',cx+Math.cos(a)*7);p.setAttribute('cy',cy+Math.sin(a)*7);p.setAttribute('rx','5.5');p.setAttribute('ry','7');p.setAttribute('transform',`rotate(${i*72},${cx+Math.cos(a)*7},${cy+Math.sin(a)*7})`);p.setAttribute('fill',col);g.appendChild(p);}return g;}

function makeShape(card){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 80 90');
  const col=CM[card.color], n=card.count;
  const gap=28, startY=45-((n-1)*gap)/2;
  for(let i=0;i<n;i++){
    if(card.shape==='ougi') svg.appendChild(drawOugi(col, startY+i*gap));
    else if(card.shape==='torii') svg.appendChild(drawTorii(col, startY+i*gap));
    else svg.appendChild(drawUme(col, startY+i*gap));
  }
  return svg;
}

function render(){
  const bd=document.getElementById('board'); bd.innerHTML='';
  board.forEach((card,i)=>{
    const div=document.createElement('div'); div.className='card';
    const svg=makeShape(card);
    // ふわふわのタイミングをずらす
    svg.style.setProperty('--float-delay', (-Math.random() * 4).toFixed(1) + 's');
    div.appendChild(svg);
    div.onclick=()=>{
      if(sel.includes(i)){sel=sel.filter(x=>x!==i);div.classList.remove('selected');}
      else if(sel.length<3){sel.push(i);div.classList.add('selected');}
      if(sel.length===3) submit();
    };
    bd.appendChild(div);
  });
}

function submit(){
  const [a,b,c]=sel.map(idx=>board[idx]);
  if(isSet(a,b,c)){
    score++; document.getElementById('score').textContent=score;
    sel.sort((a,b)=>b-a).forEach(i=>board.splice(i,1));
    while(board.length<12 && deck.length>0) board.push(deck.pop());
    render();
  }
  sel=[]; document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
}

deck=makeDeck(); board=[]; for(let i=0;i<12;i++) board.push(deck.pop());
render();
</script>
