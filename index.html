<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>組 -KUMI-</title>
<style>
/* CSS */
:root { --washi: #f2ede4; --sumi: #1a1510; --kin: #c49a3c; --aka: #b5321e; --seiji: #3d6e63; }
body { background: var(--washi); color: var(--sumi); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin:0; }
#board { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 6px; flex: 1; padding: 10px; }
.card { background: white; border: 1px solid #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .1s; }
.card.selected { border: 2px solid var(--kin); background: #fffbf0; }
/* ★消える演出 */
@keyframes exorcise {
  0% { transform: scale(1); opacity: 1; filter: brightness(1); }
  50% { transform: scale(1.1); opacity: 0.8; filter: brightness(2); }
  100% { transform: scale(0.5); opacity: 0; }
}
.card.correct { animation: exorcise 0.5s ease-out forwards; pointer-events: none; }
.card svg { width: 80%; height: 80%; display: block; animation: spirit-alive 4s ease-in-out infinite; animation-delay: var(--float-delay, 0s); }
@keyframes spirit-alive { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
#ui { padding: 15px; text-align: center; font-weight: bold; }
</style>
</head>
<body>
<div id="ui">組 -KUMI- <span id="score">0</span></div>
<div id="board"></div>

<script>
// --- 音声とロジック ---
let ctx=null;
function ac(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
function playTone(freq, type='sine', dur=0.2){
  const c=ac(), o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.1, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dur);
  o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+dur);
}

const COLORS=['aka','seiji','yamabuki'], SHAPES=['ougi','torii','ume'], COUNTS=[1,2,3], CM={aka:'#b5321e',seiji:'#3d6e63',yamabuki:'#c49a3c'};
let deck=[],board=[],sel=[],score=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function makeDeck(){const d=[];for(const c of COLORS)for(const s of SHAPES)for(const n of COUNTS)d.push({color:c,shape:s,count:n});return shuffle(d);}
function isSet(a,b,c){for(const k of['color','shape','count']){if(new Set([a[k],b[k],c[k]]).size===2)return false;}return true;}

function makeShape(card){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg'); svg.setAttribute('viewBox','0 0 80 90');
  // 簡略化して描画
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('width','40'); rect.setAttribute('height','40');
  rect.setAttribute('fill',CM[card.color]);
  svg.appendChild(rect);
  return svg;
}

function render(){
  const bd=document.getElementById('board'); bd.innerHTML='';
  board.forEach((card,i)=>{
    const div=document.createElement('div'); div.className='card';
    const svg=makeShape(card);
    svg.style.setProperty('--float-delay', (-Math.random() * 4).toFixed(1) + 's');
    div.appendChild(svg);
    div.addEventListener('click',()=>pick(i, div));
    bd.appendChild(div);
  });
}

function pick(i, div){
  ac(); // 音声を有効化
  if(sel.includes(i)){ sel=sel.filter(x=>x!==i); div.classList.remove('selected'); playTone(440,'triangle',0.1); }
  else if(sel.length<3){ sel.push(i); div.classList.add('selected'); playTone(660,'sine',0.1); }
  if(sel.length===3) submit();
}

function submit(){
  const [a,b,c]=sel.map(idx=>board[idx]);
  if(isSet(a,b,c)){
    score++; document.getElementById('score').textContent=score;
    playTone(880,'sine',0.3); playTone(1100,'sine',0.5);
    // 消える演出
    document.querySelectorAll('.card.selected').forEach(el=>el.classList.add('correct'));
    setTimeout(()=>{
      sel.sort((a,b)=>b-a).forEach(i=>board.splice(i,1));
      while(board.length<12 && deck.length>0) board.push(deck.pop());
      render();
      sel=[];
    }, 500);
  } else {
    playTone(220,'sawtooth',0.3);
    sel=[]; document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  }
}

deck=makeDeck(); board=[]; for(let i=0;i<12;i++) board.push(deck.pop());
render();
</script>
</body>
</html>
